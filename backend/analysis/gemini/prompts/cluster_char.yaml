version: 4
purpose: |
  Called once per cluster. Produce a CATEGORICAL description of the cluster's
  shared behaviour. Do not name or quote any individual episode — descriptions
  that mention "Episode 18 takes…" are read as flags by users even when the
  cited episode isn't statistically anomalous, which causes recurring
  confusion against the separate Flagged Episodes section.

  v4 (2026-04-27): forbid all episode_id mentions in description. Drop the
  evidence array's role — it's now optional and must not name episodes
  either. Frontend stops rendering it. The medoid video + telemetry block
  are still passed in to ground the description, but their specifics stay
  internal to the model — users only see the categorical summary.

  v3 retained: telemetry-grounded; v2 retained: per-video phase + gripper
  context.

system: |
  You are a robotics teleoperation analyst. Produce a single categorical
  description of what behaviourally defines this cluster, using the medoid
  video + telemetry to ground the statement.

  HARD RULES:
  - The description MUST NOT mention any episode_id, episode number, or
    "Episode N" by name. Talk about the cluster's behaviour categorically
    (e.g. "Episodes in this cluster begin with a slow approach…", not
    "Episode 18 begins with a slow approach…").
  - Do not name contrast clusters by member id either. You may say "compared
    to cluster C2" or "vs the contrast cluster" — never name the contrast
    medoid by episode_id.
  - Cite timestamp ranges if useful ("approach phase often runs 0–4s") but
    not anchored to specific episode ids.
  - If the cluster looks like a stat artifact with no clear shared
    behaviour, say so and set confidence: "low".

  Why: episode-level mentions in a cluster description visually mirror the
  Flagged Episodes section below and lead users to think the named episode
  is being flagged.

user_template: |
  TASK: {task_name}

  Episodes are recorded at {fps} Hz. Each video below is followed by a
  telemetry block:
    • phase timeline in seconds (Approach/Grasp/Lift/Transit/Place/Release/Return per cycle)
    • gripper event log: pre-merge open/close transitions in seconds
    • per-phase position & rotation magnitude summary

  ────────────────────────────────────────────────────────────────────
  CLUSTER {target_cluster_id} — describing its MEDOID only
  ────────────────────────────────────────────────────────────────────

  Stat label: "{target_cluster_stat_label}"
  Dominant features: {target_dominant_features}
  Cluster size: {target_cluster_size} of {cohort_size} cohort episodes
  MEDOID episode_id (the only target-cluster episode you may name): {medoid_episode_id}

  Target medoid (Video 1):
  {target_videos_block}

  Contrast medoid(s) for comparison:
  {contrast_videos_block}

  ────────────────────────────────────────────────────────────────────

  Answer in strict JSON:
    "proposed_label":    2-5 word behaviour-oriented label.
    "description":       1-3 sentences describing the CLUSTER's shared
                         behaviour categorically. NEVER mention any
                         episode_id, episode number, or "Episode N" name.
                         Talk about what episodes in this cluster typically
                         do, contrasted with the contrast cluster(s). Cite
                         timestamp ranges if useful but anchor them to
                         "the cluster's typical execution", not to a
                         specific episode.
    "evidence":          array of {{timestamp, note}}. Each entry is a
                         categorical observation (e.g. "approach phase
                         typically runs 0–4 s"). Do NOT include episode_id
                         on evidence entries. 0–4 entries. May be omitted.
    "confidence":        "high" | "medium" | "low". Use "low" when the
                         cluster shows no clear shared behavioural trait
                         distinct from contrast clusters.

response_schema:
  type: object
  properties:
    proposed_label: {type: string}
    description: {type: string}
    evidence:
      type: array
      items:
        type: object
        properties:
          timestamp: {type: string}
          note: {type: string}
        required: [timestamp, note]
    confidence: {type: string, enum: [high, medium, low]}
  required: [proposed_label, description, confidence]
